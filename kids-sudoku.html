<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Kids Sudoku</title>
<style>
  :root {
    --bg: #fdf6ec;
    --panel: #ffffff;
    --line: #d8c9b4;
    --line-bold: #8a6f4d;
    --ink: #3d3327;
    --sub: #9a8a72;
    --given: #3d3327;
    --user: #2f7dd1;
    --accent: #f2994a;
    --wrong: #e05555;
    --win: #43a86f;
    --sel: #ffe9c7;
    --same: #f6f0e4;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Avenir Next", "PingFang TC", "Noto Sans TC", system-ui, sans-serif;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:16px; touch-action:manipulation; user-select:none; -webkit-user-select:none;
    padding: 12px;
  }
  h1 { font-size:1.4rem; letter-spacing:0.4em; text-indent:0.4em; color:var(--sub); font-weight:600; }

  .sizes { display:flex; gap:10px; }
  .sizes button {
    font:inherit; font-weight:700; font-size:1rem;
    padding:10px 22px; border-radius:999px;
    border:2px solid var(--line-bold); background:var(--panel); color:var(--ink);
    cursor:pointer;
  }
  .sizes button.active { background:var(--accent); border-color:var(--accent); color:#fff; }

  #grid {
    display:grid; background:var(--line-bold);
    border:3px solid var(--line-bold); border-radius:12px; overflow:hidden;
    width:min(88vw, 56vh, 520px); height:min(88vw, 56vh, 520px);
    gap:1px;
  }
  .cell {
    background:var(--panel);
    display:flex; align-items:center; justify-content:center;
    font-weight:700; cursor:pointer;
    font-size: var(--cell-font, 1.6rem);
  }
  .cell.box-r { box-shadow: inset -3px 0 0 var(--line-bold); }
  .cell.box-b { box-shadow: inset 0 -3px 0 var(--line-bold); }
  .cell.box-r.box-b { box-shadow: inset -3px 0 0 var(--line-bold), inset 0 -3px 0 var(--line-bold); }
  .cell.given { color:var(--given); background:#f7efe2; }
  .cell.user { color:var(--user); }
  .cell.wrong { color:var(--wrong); }
  .cell.selected { background:var(--sel) !important; }
  .cell.same { background:var(--same); }
  #grid.won .cell { background:#e4f5ec; color:var(--win); }

  .pad { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; max-width:520px; }
  .pad button {
    font:inherit; font-size:1.5rem; font-weight:700;
    width:56px; height:56px; border-radius:14px;
    border:2px solid var(--line); background:var(--panel); color:var(--user);
    cursor:pointer; box-shadow:0 3px 0 var(--line);
  }
  .pad button:active { transform:translateY(2px); box-shadow:0 1px 0 var(--line); }
  .pad button.erase { color:var(--sub); font-size:1.1rem; width:auto; padding:0 18px; }

  .actions { display:flex; gap:12px; }
  .actions button {
    font:inherit; font-size:0.95rem; font-weight:600; letter-spacing:0.1em;
    padding:12px 28px; border-radius:12px; border:none; cursor:pointer;
    background:var(--accent); color:#fff; box-shadow:0 3px 0 #c97a2e;
  }
  .actions button:active { transform:translateY(2px); box-shadow:0 1px 0 #c97a2e; }
  #winMsg { min-height:1.4rem; font-weight:700; color:var(--win); letter-spacing:0.15em; opacity:0; transition:opacity .4s; }
  #winMsg.show { opacity:1; }
</style>
</head>
<body>
  <h1>Kids Sudoku</h1>

  <div class="sizes">
    <button data-n="4" class="active">4×4</button>
    <button data-n="6">6×6</button>
    <button data-n="9">9×9</button>
  </div>

  <div id="grid"></div>
  <div id="winMsg">🎉 Great job!</div>
  <div class="pad" id="pad"></div>

  <div class="actions">
    <button id="newBtn">New Game</button>
  </div>

<script>
(function () {
  const gridEl = document.getElementById('grid');
  const padEl = document.getElementById('pad');
  const winMsg = document.getElementById('winMsg');
  const sizeBtns = document.querySelectorAll('.sizes button');

  let N = 4, BR = 2, BC = 2;      // grid size, box rows, box cols
  let solution = [], puzzle = [], given = [];
  let selected = -1, won = false;
  let cells = [];

  const CONFIG = {
    4: { br: 2, bc: 2, holes: 6,  font: '2.2rem' },
    6: { br: 2, bc: 3, holes: 14, font: '1.8rem' },
    9: { br: 3, bc: 3, holes: 40, font: '1.4rem' },
  };

  function boxIndex(r, c) { return Math.floor(r / BR) * (N / BC) + Math.floor(c / BC); }

  function generateSolution() {
    const g = Array.from({ length: N }, () => Array(N).fill(0));
    function ok(r, c, v) {
      for (let i = 0; i < N; i++) {
        if (g[r][i] === v || g[i][c] === v) return false;
      }
      const r0 = Math.floor(r / BR) * BR, c0 = Math.floor(c / BC) * BC;
      for (let i = r0; i < r0 + BR; i++)
        for (let j = c0; j < c0 + BC; j++)
          if (g[i][j] === v) return false;
      return true;
    }
    function fill(idx) {
      if (idx === N * N) return true;
      const r = Math.floor(idx / N), c = idx % N;
      const vals = [...Array(N).keys()].map(x => x + 1).sort(() => Math.random() - 0.5);
      for (const v of vals) {
        if (ok(r, c, v)) {
          g[r][c] = v;
          if (fill(idx + 1)) return true;
          g[r][c] = 0;
        }
      }
      return false;
    }
    fill(0);
    return g.flat();
  }

  function newGame(n) {
    const cfg = CONFIG[n];
    N = n; BR = cfg.br; BC = cfg.bc;
    solution = generateSolution();
    puzzle = solution.slice();
    given = Array(N * N).fill(true);

    // punch holes
    const idxs = [...Array(N * N).keys()].sort(() => Math.random() - 0.5);
    for (let k = 0; k < cfg.holes; k++) {
      puzzle[idxs[k]] = 0;
      given[idxs[k]] = false;
    }

    selected = -1; won = false;
    winMsg.classList.remove('show');
    gridEl.classList.remove('won');
    buildGrid(cfg);
    buildPad();
  }

  function buildGrid(cfg) {
    gridEl.innerHTML = '';
    gridEl.style.gridTemplateColumns = `repeat(${N}, 1fr)`;
    gridEl.style.setProperty('--cell-font', cfg.font);
    cells = [];
    for (let i = 0; i < N * N; i++) {
      const r = Math.floor(i / N), c = i % N;
      const el = document.createElement('div');
      el.className = 'cell';
      if ((c + 1) % BC === 0 && c !== N - 1) el.classList.add('box-r');
      if ((r + 1) % BR === 0 && r !== N - 1) el.classList.add('box-b');
      if (puzzle[i] !== 0) {
        el.textContent = puzzle[i];
        el.classList.add('given');
      }
      el.addEventListener('pointerdown', () => select(i));
      gridEl.appendChild(el);
      cells.push(el);
    }
  }

  function buildPad() {
    padEl.innerHTML = '';
    for (let v = 1; v <= N; v++) {
      const b = document.createElement('button');
      b.textContent = v;
      b.addEventListener('pointerdown', () => input(v));
      padEl.appendChild(b);
    }
    const e = document.createElement('button');
    e.textContent = 'Erase';
    e.className = 'erase';
    e.addEventListener('pointerdown', () => input(0));
    padEl.appendChild(e);
  }

  function select(i) {
    if (won || given[i]) { highlight(i); return; }
    selected = i;
    highlight(i);
  }

  function highlight(i) {
    const v = puzzle[i];
    cells.forEach((el, j) => {
      el.classList.toggle('selected', j === selected);
      el.classList.toggle('same', v !== 0 && puzzle[j] === v && j !== selected);
    });
  }

  function input(v) {
    if (won || selected < 0) return;
    puzzle[selected] = v;
    const el = cells[selected];
    el.textContent = v === 0 ? '' : v;
    el.classList.remove('user', 'wrong');
    if (v !== 0) {
      el.classList.add(v === solution[selected] ? 'user' : 'wrong');
    }
    highlight(selected);
    checkWin();
  }

  function checkWin() {
    for (let i = 0; i < N * N; i++) if (puzzle[i] !== solution[i]) return;
    won = true;
    gridEl.classList.add('won');
    winMsg.classList.add('show');
    cells.forEach(el => el.classList.remove('selected', 'same'));
  }

  sizeBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      sizeBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      newGame(parseInt(btn.dataset.n, 10));
    });
  });

  document.getElementById('newBtn').addEventListener('click', () => newGame(N));

  newGame(4);
})();
</script>
</body>
</html>
