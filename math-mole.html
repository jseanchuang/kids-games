<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Math Mole Whack</title>
<style>
  :root {
    --bg: #d8f0c8;
    --dirt: #8a6242;
    --dirt-dark: #6b4a30;
    --ink: #3d4a2b;
    --sub: #7d9463;
    --accent: #f2707a;
    --good: #43a86f;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; }
  body {
    background: linear-gradient(180deg, #bfe8ff 0%, #bfe8ff 28%, var(--bg) 28%);
    color: var(--ink);
    font-family: "Avenir Next", "PingFang TC", system-ui, sans-serif;
    display:flex; flex-direction:column; align-items:center;
    touch-action:manipulation; user-select:none; -webkit-user-select:none;
  }

  #hud {
    width:100%; z-index:10;
    display:flex; align-items:center; justify-content:center; gap:14px;
    padding:10px 12px; flex-wrap:wrap;
    background:rgba(255,255,255,0.8);
    backdrop-filter: blur(6px);
    box-shadow:0 2px 10px rgba(61,74,43,0.15);
  }
  #hud label { font-size:0.82rem; color:var(--sub); font-weight:600; }
  #hud select {
    font:inherit; font-weight:700; font-size:0.95rem;
    padding:5px 12px; border-radius:10px; border:2px solid #cfe0c2; background:#fff; color:var(--ink);
  }
  #hud .score { font-weight:800; font-size:1.15rem; color:var(--good); min-width:64px; text-align:center; }
  #hud .clock { font-weight:800; font-size:1.15rem; color:var(--accent); min-width:56px; text-align:center; font-variant-numeric:tabular-nums; }
  #hud .clock.hidden { display:none; }

  #question {
    margin-top:14px;
    font-size:clamp(2rem, 7vw, 3rem); font-weight:800; letter-spacing:0.06em;
    background:#fff; padding:10px 38px; border-radius:20px;
    box-shadow:0 4px 0 rgba(61,74,43,0.15);
  }
  #question .q { color:var(--accent); }

  #field {
    flex:1; width:min(94vw, 560px);
    display:grid; grid-template-columns:repeat(3, 1fr);
    gap:4vmin; padding:4vmin 0 6vmin;
    align-content:center;
  }
  .hole {
    position:relative;
    aspect-ratio: 1 / 0.9;
    overflow:hidden;
  }
  .hole::after {
    content:''; position:absolute; bottom:0; left:5%; right:5%;
    height:26%;
    background: radial-gradient(ellipse at center, var(--dirt-dark), var(--dirt));
    border-radius:50%;
    z-index:3;
  }
  .mole {
    position:absolute; left:50%; bottom:8%;
    transform:translate(-50%, 110%);
    width:72%;
    aspect-ratio: 1 / 1.05;
    transition: transform 0.18s ease-out;
    cursor:pointer;
    z-index:2;
  }
  .mole.up { transform:translate(-50%, 0); }
  .mole .body {
    width:100%; height:100%;
    background: radial-gradient(circle at 38% 30%, #b98d68, #96674a 70%);
    border-radius:48% 48% 42% 42%;
    display:flex; flex-direction:column; align-items:center; justify-content:flex-start;
    padding-top:12%;
  }
  .mole .face { font-size:clamp(0.9rem, 3.4vmin, 1.3rem); line-height:1; }
  .mole .num {
    margin-top:6%;
    background:#fff; color:var(--ink);
    font-weight:800; font-size:clamp(1.2rem, 5vmin, 2rem);
    padding:2% 18%; border-radius:999px;
    box-shadow:0 2px 0 rgba(0,0,0,0.15);
  }
  .mole.bonk .body { background: radial-gradient(circle at 38% 30%, #ffd94d, #f2b54b 70%); }
  .mole.wrong .body { animation: wobble .3s; }
  @keyframes wobble {
    25% { transform:rotate(-8deg); }
    75% { transform:rotate(8deg); }
  }

  #praise {
    position:fixed; top:40%; left:50%; transform:translate(-50%,-50%) scale(0);
    font-size:3rem; font-weight:800; color:var(--good); z-index:15;
    text-shadow:0 3px 0 rgba(255,255,255,0.85);
    pointer-events:none;
  }
  #praise.show { animation: praise .7s forwards; }
  @keyframes praise {
    30% { transform:translate(-50%,-50%) scale(1.2); }
    60% { transform:translate(-50%,-50%) scale(1); }
    100% { transform:translate(-50%,-80%) scale(1); opacity:0; }
  }

  #overlay {
    position:fixed; inset:0; z-index:20;
    display:none; flex-direction:column; align-items:center; justify-content:center; gap:18px;
    background:rgba(255,255,255,0.9);
    backdrop-filter: blur(4px);
  }
  #overlay.show { display:flex; }
  #overlay .big { font-size:2.2rem; font-weight:800; }
  #overlay .stars { font-size:3.2rem; font-weight:800; color:var(--good); }
  #overlay button {
    font:inherit; font-size:1.1rem; font-weight:700; letter-spacing:0.08em;
    padding:14px 40px; border-radius:16px; border:none; cursor:pointer;
    color:#fff; background:var(--accent); box-shadow:0 4px 0 #c9505b;
  }
  #overlay button:active { transform:translateY(2px); box-shadow:0 2px 0 #c9505b; }

  @media (prefers-reduced-motion: reduce) {
    .mole, .mole.wrong .body, #praise.show { animation:none !important; transition:none; }
  }
</style>
</head>
<body>
  <div id="hud">
    <label>Sums to:
      <select id="rangeSelect">
        <option value="5">5</option>
        <option value="10" selected>10</option>
        <option value="20">20</option>
      </select>
    </label>
    <label>Speed: 🐢
      <input type="range" id="speedSlider" min="1" max="10" value="1" style="vertical-align:middle; width:110px; accent-color:#f2707a;">
      🐇
    </label>
    <label>Timer:
      <select id="timerSelect">
        <option value="0" selected>Free play</option>
        <option value="60">60 sec</option>
      </select>
    </label>
    <span class="clock hidden" id="clock">1:00</span>
    <span class="score" id="score">⭐ 0</span>
  </div>

  <div id="question"><span id="qa">2</span> + <span id="qb">3</span> = <span class="q">?</span></div>

  <div id="field"></div>

  <div id="praise">Great! 🎉</div>

  <div id="overlay">
    <div class="big">⏰ Time's up!</div>
    <div class="stars" id="finalScore">⭐ 0</div>
    <button id="againBtn">Play Again</button>
  </div>

<script>
(function () {
  const HOLES = 9;
  const field = document.getElementById('field');
  const qaEl = document.getElementById('qa');
  const qbEl = document.getElementById('qb');
  const scoreEl = document.getElementById('score');
  const clockEl = document.getElementById('clock');
  const praise = document.getElementById('praise');
  const overlay = document.getElementById('overlay');
  const finalScore = document.getElementById('finalScore');
  const againBtn = document.getElementById('againBtn');
  const rangeSelect = document.getElementById('rangeSelect');
  const timerSelect = document.getElementById('timerSelect');
  const speedSlider = document.getElementById('speedSlider');

  // level 1 (slowest) → level 10 (fastest), linear interpolation
  const SLOWEST = { popEvery: 2400, stayMin: 6000, stayMax: 9000 };
  const FASTEST = { popEvery: 400,  stayMin: 900,  stayMax: 1500 };
  let speed = { ...SLOWEST };

  function applySpeed() {
    const t = (parseInt(speedSlider.value, 10) - 1) / 9; // 0..1
    const lerp = (a, b) => Math.round(a + (b - a) * t);
    speed = {
      popEvery: lerp(SLOWEST.popEvery, FASTEST.popEvery),
      stayMin:  lerp(SLOWEST.stayMin,  FASTEST.stayMin),
      stayMax:  lerp(SLOWEST.stayMax,  FASTEST.stayMax),
    };
  }

  let range = 10;
  let answer = 0;
  let score = 0;
  let frozen = false;
  let timeLeft = 0;
  let countdownId = null;
  let popId = null;
  let moles = [];   // { el, numEl, hole, up, value, downTimer }

  function newQuestion() {
    const a = 1 + Math.floor(Math.random() * (range - 1));
    const b = 1 + Math.floor(Math.random() * (range - a));
    answer = a + b;
    qaEl.textContent = a;
    qbEl.textContent = b;
  }

  function wrongValue() {
    // plausible wrong answer near the correct one, within 2..range, != answer
    let v;
    do {
      v = answer + (Math.floor(Math.random() * 5) - 2); // -2..+2
      if (v === answer || v < 1) v = 1 + Math.floor(Math.random() * range);
    } while (v === answer);
    return v;
  }

  function anyCorrectUp() {
    return moles.some(m => m.up && m.value === answer);
  }

  function popOne() {
    if (frozen) return;
    const hidden = moles.filter(m => !m.up);
    if (hidden.length === 0) return;
    const m = hidden[Math.floor(Math.random() * hidden.length)];

    if (anyCorrectUp()) {
      // correct answer already on screen: mostly wrong values
      m.value = Math.random() < 0.75 ? wrongValue() : answer;
    } else {
      // no correct answer up: give it a fair chance each pop,
      // so the answer appears at a random position/time, not always first
      m.value = Math.random() < 0.4 ? answer : wrongValue();
    }
    m.numEl.textContent = m.value;
    m.up = true;
    m.el.classList.add('up');
    m.el.classList.remove('bonk', 'wrong');
    const stay = speed.stayMin + Math.random() * (speed.stayMax - speed.stayMin);
    m.downTimer = setTimeout(() => hide(m), stay);
  }

  function hide(m) {
    clearTimeout(m.downTimer);
    m.up = false;
    m.el.classList.remove('up');
  }

  function whack(m) {
    if (!m.up || frozen) return;
    if (m.value === answer) {
      m.el.classList.add('bonk');
      score++;
      scoreEl.textContent = '⭐ ' + score;
      praise.classList.remove('show');
      void praise.offsetWidth;
      praise.classList.add('show');
      setTimeout(() => {
        moles.forEach(hide);
        newQuestion();
      }, 250);
    } else {
      m.el.classList.add('wrong');
      setTimeout(() => m.el.classList.remove('wrong'), 320);
    }
  }

  function build() {
    field.innerHTML = '';
    moles = [];
    for (let i = 0; i < HOLES; i++) {
      const hole = document.createElement('div');
      hole.className = 'hole';
      const mole = document.createElement('div');
      mole.className = 'mole';
      mole.innerHTML = '<div class="body"><div class="face">🐹</div><div class="num">?</div></div>';
      const m = { el: mole, numEl: null, up: false, value: 0, downTimer: null };
      m.numEl = mole.querySelector('.num');
      mole.addEventListener('pointerdown', () => whack(m));
      hole.appendChild(mole);
      field.appendChild(hole);
      moles.push(m);
    }
  }

  function fmt(sec) { return Math.floor(sec / 60) + ':' + String(sec % 60).padStart(2, '0'); }
  function stopCountdown() { clearInterval(countdownId); countdownId = null; }

  function startCountdown() {
    clockEl.textContent = fmt(timeLeft);
    countdownId = setInterval(() => {
      timeLeft--;
      clockEl.textContent = fmt(Math.max(0, timeLeft));
      if (timeLeft <= 0) {
        stopCountdown();
        frozen = true;
        moles.forEach(hide);
        finalScore.textContent = '⭐ ' + score;
        overlay.classList.add('show');
      }
    }, 1000);
  }

  function reset() {
    stopCountdown();
    clearInterval(popId);
    overlay.classList.remove('show');
    frozen = false;
    score = 0;
    scoreEl.textContent = '⭐ 0';
    range = parseInt(rangeSelect.value, 10);
    applySpeed();

    build();
    newQuestion();

    const t = parseInt(timerSelect.value, 10);
    if (t > 0) {
      timeLeft = t;
      clockEl.classList.remove('hidden');
      startCountdown();
    } else {
      clockEl.classList.add('hidden');
    }

    popId = setInterval(popOne, speed.popEvery);
  }

  rangeSelect.addEventListener('change', reset);
  timerSelect.addEventListener('change', reset);
  speedSlider.addEventListener('change', reset);
  againBtn.addEventListener('pointerdown', reset);

  reset();
})();
</script>
</body>
</html>
