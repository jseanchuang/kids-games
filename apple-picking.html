<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Apple Picking Game</title>
<style>
  :root {
    --bg: #f2f8ec;
    --panel: #ffffff;
    --line: #cfe0c2;
    --ink: #35462a;
    --sub: #8aa376;
    --p1: #e05555;
    --p2: #2f7dd1;
    --sel: #ffe08a;
    --taken: #e6ede0;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Avenir Next", "PingFang TC", system-ui, sans-serif;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:16px; padding:14px; touch-action:manipulation; user-select:none; -webkit-user-select:none;
  }
  h1 { font-size:1.35rem; letter-spacing:0.3em; text-indent:0.3em; color:var(--sub); font-weight:600; }

  .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:center; }
  .row button, .row select {
    font:inherit; font-weight:700; font-size:0.95rem;
    padding:9px 20px; border-radius:999px;
    border:2px solid var(--line); background:var(--panel); color:var(--ink);
    cursor:pointer;
  }
  .row button.active { background:var(--ink); border-color:var(--ink); color:#fff; }
  .row label { font-size:0.85rem; color:var(--sub); font-weight:600; }

  #turnBar {
    font-size:1.1rem; font-weight:700; letter-spacing:0.05em;
    padding:10px 28px; border-radius:14px; color:#fff;
    background: var(--p1);
    transition: background .25s;
  }
  #turnBar.p2 { background: var(--p2); }
  #turnBar.over { background: var(--sub); }

  #orchard {
    display:grid; gap:8px;
    background: var(--panel);
    border:3px solid var(--line);
    border-radius:18px;
    padding:14px;
    max-width: 94vw;
  }
  .apple {
    width: var(--as, 58px); height: var(--as, 58px);
    display:flex; align-items:center; justify-content:center;
    font-size: calc(var(--as, 58px) * 0.62);
    border-radius:50%;
    cursor:pointer;
    background:transparent;
    transition: background .12s, transform .12s;
  }
  .apple.selected { background: var(--sel); transform: scale(1.08); }
  .apple.taken { pointer-events:none; }
  .apple.taken span { visibility:hidden; }
  .apple.taken { background: var(--taken); }
  .apple.taken.byp1 { box-shadow: inset 0 0 0 3px var(--p1); }
  .apple.taken.byp2 { box-shadow: inset 0 0 0 3px var(--p2); }

  .actions { display:flex; gap:12px; }
  .actions button {
    font:inherit; font-size:1rem; font-weight:700; letter-spacing:0.08em;
    padding:13px 34px; border-radius:14px; border:none; cursor:pointer;
    color:#fff; box-shadow:0 3px 0 rgba(0,0,0,0.2);
  }
  .actions button:active { transform:translateY(2px); box-shadow:0 1px 0 rgba(0,0,0,0.2); }
  #takeBtn { background:#43a86f; }
  #takeBtn:disabled { background:#b9cfc0; box-shadow:none; cursor:default; }
  #resetBtn { background:#f2994a; }

  #hint { min-height:1.2rem; font-size:0.85rem; color:var(--sub); font-weight:600; }
</style>
</head>
<body>
  <h1>🍎 Apple Picking</h1>

  <div class="row">
    <button id="mode1d" class="active">1 Row</button>
    <button id="mode2d">5 × 5</button>
    <label id="nLabel">Apples:
      <select id="nSelect">
        <option>8</option><option selected>12</option><option>15</option><option>20</option>
      </select>
    </label>
    <label>Last apple:
      <select id="ruleSelect">
        <option value="win" selected>Wins</option>
        <option value="lose">Loses</option>
      </select>
    </label>
  </div>

  <div id="turnBar">🔴 Player 1's turn</div>
  <div id="orchard"></div>
  <div id="hint">Pick 1–3 apples in a straight line, then press Take!</div>

  <div class="actions">
    <button id="takeBtn" disabled>Take 🍎</button>
    <button id="resetBtn">New Game</button>
  </div>

<script>
(function () {
  const orchard = document.getElementById('orchard');
  const turnBar = document.getElementById('turnBar');
  const hint = document.getElementById('hint');
  const takeBtn = document.getElementById('takeBtn');
  const resetBtn = document.getElementById('resetBtn');
  const mode1dBtn = document.getElementById('mode1d');
  const mode2dBtn = document.getElementById('mode2d');
  const nLabel = document.getElementById('nLabel');
  const nSelect = document.getElementById('nSelect');
  const ruleSelect = document.getElementById('ruleSelect');

  let mode = '1d';           // '1d' | '2d'
  let rows = 1, cols = 12;
  let taken = [];            // 0 = free, 1/2 = taken by player
  let selected = [];         // indices currently selected
  let player = 1;
  let over = false;
  let cells = [];

  function idx(r, c) { return r * cols + c; }

  function newGame() {
    if (mode === '1d') {
      rows = 1;
      cols = parseInt(nSelect.value, 10);
    } else {
      rows = 5;
      cols = 5;
    }
    taken = Array(rows * cols).fill(0);
    selected = [];
    player = 1;
    over = false;
    build();
    updateBar();
    updateTake();
    hint.textContent = 'Pick 1–3 apples in a straight line, then press Take!';
  }

  function build() {
    orchard.innerHTML = '';
    cells = [];
    // apple size: fit within ~90vw
    const size = mode === '2d'
      ? Math.min(62, Math.floor((Math.min(window.innerWidth, 520) * 0.9 - 28 - 8 * (cols - 1)) / cols))
      : Math.min(58, Math.floor((window.innerWidth * 0.92 - 28 - 8 * (cols - 1)) / cols));
    orchard.style.setProperty('--as', size + 'px');
    orchard.style.gridTemplateColumns = `repeat(${cols}, ${size}px)`;
    for (let i = 0; i < rows * cols; i++) {
      const el = document.createElement('div');
      el.className = 'apple';
      el.innerHTML = '<span>🍎</span>';
      if (taken[i]) el.classList.add('taken', taken[i] === 1 ? 'byp1' : 'byp2');
      if (selected.includes(i)) el.classList.add('selected');
      el.addEventListener('pointerdown', () => toggle(i));
      orchard.appendChild(el);
      cells.push(el);
    }
  }

  function isValidSelection(sel) {
    if (sel.length === 0 || sel.length > 3) return false;
    if (sel.length === 1) return true;
    const rs = sel.map(i => Math.floor(i / cols));
    const cs = sel.map(i => i % cols);
    const sameRow = rs.every(r => r === rs[0]);
    const sameCol = cs.every(c => c === cs[0]);
    if (!sameRow && !sameCol) return false;
    const line = sameRow ? [...cs].sort((a, b) => a - b) : [...rs].sort((a, b) => a - b);
    // contiguous, and no taken apple inside the span (span == selection since all selected are free)
    for (let k = 1; k < line.length; k++) {
      if (line[k] !== line[k - 1] + 1) return false;
    }
    return true;
  }

  function toggle(i) {
    if (over || taken[i]) return;
    const at = selected.indexOf(i);
    if (at >= 0) {
      selected.splice(at, 1);
    } else {
      if (selected.length >= 3) return;
      const next = selected.concat(i);
      if (!isValidSelection(next)) return;
      selected = next;
    }
    cells.forEach((el, j) => el.classList.toggle('selected', selected.includes(j)));
    updateTake();
  }

  function updateTake() {
    takeBtn.disabled = over || !isValidSelection(selected) || selected.length === 0;
  }

  function updateBar() {
    if (over) return;
    turnBar.classList.toggle('p2', player === 2);
    turnBar.textContent = (player === 1 ? '🔴 Player 1' : '🔵 Player 2') + "'s turn";
  }

  function take() {
    if (takeBtn.disabled) return;
    selected.forEach(i => {
      taken[i] = player;
      cells[i].classList.remove('selected');
      cells[i].classList.add('taken', player === 1 ? 'byp1' : 'byp2');
    });
    const lastTaker = player;
    selected = [];
    updateTake();

    if (taken.every(t => t !== 0)) {
      over = true;
      const rule = ruleSelect.value;
      const winner = rule === 'win' ? lastTaker : (lastTaker === 1 ? 2 : 1);
      turnBar.classList.add('over');
      turnBar.textContent = `🎉 Player ${winner} wins!`;
      hint.textContent = rule === 'win'
        ? 'Took the last apple — winner!'
        : 'The other player took the last apple!';
      return;
    }
    player = player === 1 ? 2 : 1;
    updateBar();
  }

  mode1dBtn.addEventListener('click', () => {
    mode = '1d';
    mode1dBtn.classList.add('active');
    mode2dBtn.classList.remove('active');
    nLabel.style.display = '';
    newGame();
  });
  mode2dBtn.addEventListener('click', () => {
    mode = '2d';
    mode2dBtn.classList.add('active');
    mode1dBtn.classList.remove('active');
    nLabel.style.display = 'none';
    newGame();
  });
  nSelect.addEventListener('change', newGame);
  ruleSelect.addEventListener('change', newGame);
  takeBtn.addEventListener('pointerdown', take);
  resetBtn.addEventListener('pointerdown', newGame);
  window.addEventListener('resize', () => { if (!over) build(); });

  newGame();
})();
</script>
</body>
</html>
